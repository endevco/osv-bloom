name: refresh

on:
  schedule:
    - cron: '0,10,20,30,40,50 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/refresh.yml'

# Writes to the `gh-pages` branch only; no main-branch writes.
permissions:
  contents: write

# Two deploys racing the same branch would overwrite each other's
# force-push. One refresh at a time.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: true

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: '. -> target'

      - name: Build filter
        # `_site/` is what GitHub Pages serves; `.nojekyll` keeps it
        # from trying to process the binary artifacts as a Jekyll
        # site.
        run: |
          mkdir -p _site
          cargo run --release -p osv-bloom-build -- --out-dir _site
          touch _site/.nojekyll

      - name: Summary
        run: |
          {
            echo "### osv-bloom refresh"
            echo
            jq -r '
              "- built: \(.built_at_rfc3339)",
              "- entries: \(.entry_count)",
              "- advisories: \(.advisory_count)",
              "- bloom: \(.bloom_byte_len) bytes (m=\(.bloom_m_bits), k=\(.bloom_k_hashes), target FPR=\(.target_fpr))",
              "- set digest: \(.set_digest_sha256)"
            ' _site/manifest.json
          } >> "$GITHUB_STEP_SUMMARY"

      # Orphan-commit + force-push so `gh-pages` always has exactly
      # one commit and no binary history accumulates. The composite
      # actions/deploy-pages route is blocked by org policy because
      # it transitively references `actions/upload-artifact@v4` without
      # a SHA pin we can vouch for; this hand-rolled path uses only
      # git itself.
      - name: Deploy to gh-pages
        run: |
          set -euo pipefail
          git config user.name 'osv-bloom-bot[bot]'
          git config user.email 'osv-bloom-bot@users.noreply.github.com'
          mv _site /tmp/_site
          git checkout --orphan gh-pages
          git rm -rf . >/dev/null
          mv /tmp/_site/* /tmp/_site/.[!.]* .
          git add -A
          set_digest=$(jq -r .set_digest_sha256 manifest.json | cut -c1-12)
          entry_count=$(jq -r .entry_count manifest.json)
          git commit -m "deploy: filter (${entry_count} entries, set@${set_digest})"
          git push -f origin gh-pages
