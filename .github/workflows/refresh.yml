name: refresh

on:
  schedule:
    - cron: '0,10,20,30,40,50 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/refresh.yml'

# `pages: write` + `id-token: write` are what actions/deploy-pages
# needs; we don't write to git anymore so contents: read is enough.
permissions:
  contents: read
  pages: write
  id-token: write

# Two concurrent deploys to the same Pages site would race; one in
# flight at a time. Don't cancel in-progress — let the running
# refresh finish so we always have a fresh artifact landing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Environment binding is what deploy-pages reads to learn the
    # site URL; the action returns its concrete URL into `pages_url`.
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: '. -> target'

      - name: Build filter
        # `_site` is what upload-pages-artifact expects by default.
        # `.nojekyll` keeps Pages from trying to process our binary
        # artifacts as a Jekyll site.
        run: |
          mkdir -p _site
          cargo run --release -p osv-bloom-build -- --out-dir _site
          touch _site/.nojekyll

      - name: Summary
        run: |
          {
            echo "### osv-bloom refresh"
            echo
            jq -r '
              "- built: \(.built_at_rfc3339)",
              "- entries: \(.entry_count)",
              "- advisories: \(.advisory_count)",
              "- bloom: \(.bloom_byte_len) bytes (m=\(.bloom_m_bits), k=\(.bloom_k_hashes), target FPR=\(.target_fpr))",
              "- set digest: \(.set_digest_sha256)"
            ' _site/manifest.json
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
