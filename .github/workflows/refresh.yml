name: refresh

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/refresh.yml'

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: true

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: '. -> target'

      - name: Build filter
        run: cargo run --release -p osv-bloom-build -- --out-dir dist

      - name: Commit if the set changed
        id: commit
        run: |
          set -euo pipefail
          git config user.name 'osv-bloom-bot[bot]'
          git config user.email 'osv-bloom-bot@users.noreply.github.com'
          git add dist/filter.bin dist/manifest.json
          if git diff --cached --quiet; then
            echo "filter.bin unchanged — skipping commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          entry_count=$(jq -r .entry_count dist/manifest.json)
          advisory_count=$(jq -r .advisory_count dist/manifest.json)
          set_digest=$(jq -r .set_digest_sha256 dist/manifest.json | cut -c1-12)
          git commit -m "chore: refresh filter (${entry_count} entries, ${advisory_count} advisories, set@${set_digest})"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          {
            echo "### osv-bloom refresh"
            echo
            jq -r '
              "- built: \(.built_at_rfc3339)",
              "- entries: \(.entry_count)",
              "- advisories: \(.advisory_count)",
              "- bloom: \(.bloom_byte_len) bytes (m=\(.bloom_m_bits), k=\(.bloom_k_hashes), target FPR=\(.target_fpr))",
              "- set digest: \(.set_digest_sha256)",
              "- committed: ${{ steps.commit.outputs.committed }}"
            ' dist/manifest.json
          } >> "$GITHUB_STEP_SUMMARY"
